<meta property="og:title" content="POP POP · CORN-TROVERSY">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{ --pink:#ee88d0; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{ background:radial-gradient(92% 72% at 50% 44%, #f3a0da 0%, var(--pink) 62%), var(--pink);
    min-height:100svh; display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer; }
  .stage{ position:relative; width:min(88vw, 66svh); display:flex; align-items:center; justify-content:center; }
  .stage::before{ content:""; position:absolute; inset:-12% -12%;
    background:radial-gradient(circle at 50% 48%, rgba(255,255,255,.55), rgba(255,255,255,0) 55%);
    opacity:0; transform:scale(.4); border-radius:50%; }
  .stage.play::before{ animation:burst .55s ease-out .05s both; }
  @keyframes burst{ 0%{opacity:0;transform:scale(.3)} 40%{opacity:.85;transform:scale(1.05)} 100%{opacity:0;transform:scale(1.25)} }
  .idle{will-change:transform}
  .stage.play .idle{ animation:breathe 3.4s ease-in-out .7s infinite; }
  @keyframes breathe{ 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-1.2%) scale(1.012)} }
  .pop{opacity:0;transform-origin:center 55%;will-change:transform,opacity}
  .stage.play .pop{ animation:bam .58s cubic-bezier(.3,.9,.3,1) both; }
  @keyframes bam{ 0%{opacity:0;transform:scale(.28) rotate(-7deg)} 55%{opacity:1;transform:scale(1.09) rotate(2.5deg)} 74%{transform:scale(.965) rotate(-1.2deg)} 88%{transform:scale(1.02) rotate(.4deg)} 100%{opacity:1;transform:scale(1) rotate(0)} }
  .pop img{width:100%;height:auto;display:block;filter:drop-shadow(0 10px 20px rgba(120,30,90,.22));}
  @media (prefers-reduced-motion: reduce){ .pop{opacity:1!important;transform:none!important;animation:none!important} .stage.play .idle,.stage.play::before{animation:none!important} }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="idle"><div class="pop"><img src="poppop_logo.png" alt="POP POP · CORN-TROVERSY" draggable="false"></div></div>
  </div>
<script>
  const stage=document.getElementById('stage');
  function play(){ stage.classList.remove('play'); void stage.offsetWidth; stage.classList.add('play'); }
  window.addEventListener('load',play); stage.addEventListener('click',play);
</script>
</body>
</html>
