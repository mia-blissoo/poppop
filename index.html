<style>
:root{--pink:#ee88d0}*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{background:radial-gradient(92% 72% at 50% 44%, #f3a0da 0%, var(--pink) 62%), var(--pink);min-height:100svh;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}
.stage{position:relative;height:min(94svh, calc(94vw / 0.944));aspect-ratio:4938 / 5233;width:auto}
.item{position:absolute;left:var(--x);top:var(--y);width:var(--w);transform:translate(-50%,-50%)}
.item img{width:100%;height:auto;display:block;filter:drop-shadow(0 6px 12px rgba(120,30,90,.20))}
.float{transform:translateY(0)}
.stage.play .float{animation:floaty var(--fd,3s) ease-in-out infinite alternate;animation-delay:calc(var(--d) + .6s)}
@keyframes floaty{from{transform:translateY(0)}to{transform:translateY(-9px)}}
.pop{opacity:0;transform:scale(.2);transform-origin:center}
.stage.play .pop{animation:pop .5s cubic-bezier(.34,1.62,.5,1) var(--d) forwards}
@keyframes pop{0%{opacity:0;transform:scale(.2) rotate(-16deg)}60%{opacity:1}100%{opacity:1;transform:scale(1) rotate(0)}}
.item.logo .pop{transform-origin:center 55%}
.stage.play .item.logo .pop{animation:bam .56s cubic-bezier(.3,.9,.3,1.05) var(--d) both}
@keyframes bam{0%{opacity:0;transform:scale(.3) rotate(-5deg)}55%{opacity:1;transform:scale(1.07) rotate(2deg)}76%{transform:scale(.97) rotate(-1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@media (prefers-reduced-motion:reduce){.pop{opacity:1!important;transform:none!important;animation:none!important}.stage.play .float{animation:none!important}}
</style></head><body>
<div class="stage" id="stage"></div>
<script>

const stage=document.getElementById('stage');
for(const it of ITEMS){
 const item=document.createElement('div');item.className="item"+(it.logo?" logo":"");
 item.style.setProperty('--x',((it.cx-FX0)/FW*100)+"%");item.style.setProperty('--y',((it.cy-FY0)/FH*100)+"%");

 const fl=document.createElement('div');fl.className="float";fl.style.setProperty('--d',it.d+"s");fl.style.setProperty('--fd',it.fd+"s");
 const pop=document.createElement('div');pop.className="pop";pop.style.setProperty('--d',it.d+"s");
 const img=document.createElement('img');img.src=A+it.src;img.alt="";img.draggable=false;
 pop.appendChild(img);fl.appendChild(pop);item.appendChild(fl);stage.appendChild(item);
}
function play(){stage.classList.remove('play');void stage.offsetWidth;stage.classList.add('play')}
window.addEventListener('load',play);stage.addEventListener('click',play);
</script></body></html>
